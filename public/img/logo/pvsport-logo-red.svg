<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" role="img" aria-labelledby="title desc">
  <title id="title">PV SPORT logo</title>
  <desc id="desc">Logotipo PV SPORT en rojo y púrpura</desc>
  <defs>
    <linearGradient id="pvGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF3131"/>
      <stop offset="100%" stop-color="#7B2CBF"/>
    </linearGradient>
  </defs>
  <rect width="520" height="180" fill="transparent"/>
  <g fill="url(#pvGradient)" font-family="Segoe UI, Arial, sans-serif" font-weight="900" text-rendering="geometricPrecision">
    <text x="26" y="95" font-size="92" letter-spacing="1">PV</text>
    <text x="30" y="150" font-size="74" letter-spacing="3">SPORT</text>
  </g>
  <text x="33" y="171" fill="#1F2937" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="4">DEPORTES Y MÁS</text>
</svg>
